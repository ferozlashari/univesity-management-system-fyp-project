<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fee Management</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Fee Management</h1>
    <nav><a href="admin-dashboard.html">Back</a></nav>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Manage Fees</h2>
      <form id="feeForm" class="small-form">
        <input id="fee-roll" placeholder="Student Roll" required>
        <input id="fee-amount" type="number" placeholder="Amount" required>
        <select id="fee-status">
          <option value="paid">Paid</option>
          <option value="due">Due</option>
        </select>
        <button class="btn" type="submit">Save</button>
      </form>

      <table id="feesTable" class="table">
        <thead><tr><th>Roll</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
