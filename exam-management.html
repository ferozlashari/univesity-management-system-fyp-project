<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Exam Management</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Exam Management</h1>
    <nav><a href="teacher-dashboard.html">Back</a></nav>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Schedule Exam</h2>
      <form id="examForm" class="small-form">
        <input id="exam-course" placeholder="Course Name" required>
        <input id="exam-date" type="date" required>
        <input id="exam-time" type="time">
        <button class="btn" type="submit">Schedule</button>
      </form>

      <table id="examsTable" class="table">
        <thead><tr><th>Course</th><th>Date</th><th>Time</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
