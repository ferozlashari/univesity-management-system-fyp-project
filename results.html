<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Results</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Results</h1>
    <nav><a href="teacher-dashboard.html">Back</a></nav>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Upload / View Results</h2>
      <form id="resultForm" class="small-form">
        <input id="res-roll" placeholder="Student Roll" required>
        <input id="res-course" placeholder="Course" required>
        <input id="res-marks" type="number" placeholder="Marks" required>
        <button class="btn" type="submit">Save</button>
      </form>

      <table id="resultsTable" class="table">
        <thead><tr><th>Roll</th><th>Course</th><th>Marks</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
