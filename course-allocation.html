<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Course Allocation</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Course Allocation</h1>
    <nav><a href="admin-dashboard.html">Back</a></nav>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Allocate Course</h2>
      <form id="allocateForm" class="small-form">
        <input id="courseName" placeholder="Course Name" required>
        <input id="toTeacher" placeholder="Assign to Teacher (name or id)" required>
        <input id="courseSemester" placeholder="Semester/Year">
        <button type="submit" class="btn">Allocate</button>
      </form>

      <table id="allocTable" class="table">
        <thead><tr><th>Course</th><th>Teacher</th><th>Semester</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
