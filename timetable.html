<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Timetable</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Timetable</h1>
    <nav><a href="admin-dashboard.html">Admin</a> | <a href="student-dashboard.html">Student</a></nav>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Timetable (Create / View)</h2>
      <form id="timetableForm" class="small-form">
        <input id="tt-course" placeholder="Course" required>
        <input id="tt-day" placeholder="Day (e.g. Monday)" required>
        <input id="tt-time" type="time" required>
        <button class="btn" type="submit">Add</button>
      </form>

      <table id="ttTable" class="table">
        <thead><tr><th>Course</th><th>Day</th><th>Time</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
