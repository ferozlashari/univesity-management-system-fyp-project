<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Attendance</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Attendance</h1>
    <nav><a href="admin-dashboard.html">Admin</a> | <a href="teacher-dashboard.html">Teacher</a> | <a href="student-dashboard.html">Student</a></nav>
  </header>

  <main class="container">
    <section class="panel">
      <h2>Record Attendance</h2>
      <form id="attendanceForm" class="small-form">
        <input id="att-roll" placeholder="Student Roll" required>
        <input id="att-date" type="date" required>
        <select id="att-status">
          <option value="present">Present</option>
          <option value="absent">Absent</option>
        </select>
        <button type="submit" class="btn">Save</button>
      </form>

      <table id="attendanceTable" class="table">
        <thead><tr><th>Date</th><th>Roll</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
